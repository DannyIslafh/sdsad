<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GMAW Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f9;
}

header{
    background:#0d1b2a;
    color:white;
    padding:15px;
    text-align:center;
}

section{
    padding:20px;
}

canvas{
    background:white;
    margin:20px 0;
    padding:10px;
    border-radius:10px;
}
button{
    padding:10px 15px;
    background:#1d4ed8;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
button:hover{
    background:#2563eb;
}
</style>
</head>

<body>

<header>
    <h1>GMAW Real-Time Dashboard</h1>
</header>

<section>
    <h2>Table 2 Analysis and Control Charts</h2>

    <button onclick="downloadAllCharts()">Download All Charts (JPG)</button>

    <canvas id="control.jpg.png"></canvas>
    <canvas id="c.jpg.png"></canvas>
</section>

<script>
/* ===== SAMPLE CHARTS ===== */
const chart1 = new Chart(document.getElementById('chart1'), {
    type: 'line',
    data: {
        labels: ['1','2','3','4','5'],
        datasets: [{
            label: 'Voltage',
            data: [10, 12, 9, 14, 11],
            borderColor: 'blue',
            fill: false
        }]
    }
});

const chart2 = new Chart(document.getElementById('chart2'), {
    type: 'bar',
    data: {
        labels: ['A','B','C','D'],
        datasets: [{
            label: 'Current',
            data: [5, 8, 6, 9],
            backgroundColor: 'green'
        }]
    }
});

/* ===== DOWNLOAD FUNCTION ===== */
function downloadAllCharts() {

    const canvases = document.querySelectorAll('canvas');

    canvases.forEach((canvas, index) => {

        const link = document.createElement('a');

        link.download = `chart_${index+1}.jpg`;

        link.href = canvas.toDataURL("image/jpeg", 1.0);

        link.click();
    });

    alert("All charts downloaded!");
}
</script>

</body>
</html>
